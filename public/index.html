<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI数学学习产品V4</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <div>
          <p class="eyebrow">V4 产品级AI学习系统</p>
          <h1>AI数学学习产品</h1>
        </div>
      </div>
    </header>

    <main class="shell page-main">
      <section class="catalog-toolbar" aria-labelledby="catalog-title">
        <div>
          <p class="eyebrow">模型目录</p>
          <h2 id="catalog-title">选择一个初中数学知识点开始学习</h2>
        </div>
        <span class="catalog-count" id="catalogCount">0 个模型</span>
      </section>

      <section class="filter-panel" aria-label="知识点筛选">
        <button class="filter-button is-active" type="button" data-filter="全部">全部</button>
        <button class="filter-button" type="button" data-filter="七年级">七年级</button>
        <button class="filter-button" type="button" data-filter="八年级">八年级</button>
        <button class="filter-button" type="button" data-filter="九年级">九年级</button>
        <button class="filter-button" type="button" data-filter="数与代数">数与代数</button>
        <button class="filter-button" type="button" data-filter="图形与几何">图形与几何</button>
        <button class="filter-button" type="button" data-filter="函数">函数</button>
        <button class="filter-button" type="button" data-filter="统计与概率">统计与概率</button>
      </section>

      <section class="catalog-grid" id="modelCatalog" aria-label="数学模型目录"></section>
    </main>

    <script src="models.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
