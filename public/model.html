<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数学模型 - AI数学学习产品V4</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header compact">
      <div class="shell header-inner">
        <a class="back-link" href="index.html" aria-label="返回首页">← 返回首页</a>
        <div>
          <p class="eyebrow">AI数学学习产品V4</p>
          <h1 id="modelTitle">加载中</h1>
          <p class="model-subtitle" id="modelMetaLine"></p>
        </div>
        <div class="mistake-pill" id="mistakeCount">本模型错题数量：0</div>
      </div>
    </header>

    <main class="shell page-main model-grid">
      <section class="card visual-card">
        <div class="card-heading">
          <h2>知识点概览</h2>
          <p id="modelDescription"></p>
        </div>
        <div class="overview-panel" id="overviewPanel"></div>
      </section>

      <div class="side-stack">
        <section class="card controls-card">
          <div class="card-heading">
            <h2>核心公式与例题</h2>
          </div>
          <div id="sliderPanel" class="slider-panel"></div>
          <div id="metricPanel" class="metric-panel"></div>
        </section>

        <section class="card stats-card">
          <div class="card-heading">
            <h2>答题统计</h2>
          </div>
          <div class="stats-panel" aria-live="polite">
            <div class="stat-item">
              <span>总答题</span>
              <strong id="statTotal">0</strong>
            </div>
            <div class="stat-item">
              <span>答对</span>
              <strong id="statCorrect">0</strong>
            </div>
            <div class="stat-item">
              <span>答错</span>
              <strong id="statWrong">0</strong>
            </div>
            <div class="stat-item">
              <span>正确率</span>
              <strong id="statRate">0%</strong>
            </div>
          </div>
          <button class="secondary-button" id="resetStatsButton" type="button">重置统计</button>
        </section>
      </div>

      <section class="card interactive-card" id="interactive-section">
        <div class="card-heading">
          <h2 id="interactive-title">互动探索</h2>
          <p id="interactive-description">拖动点、滑块或参数，观察图形和公式变化。</p>
        </div>
        <div id="interactive-container" class="interactive-container"></div>
        <div id="interactive-fallback" class="content-box muted-box" hidden></div>
      </section>

      <section class="card practice-card">
        <div class="card-heading">
          <h2>随机出题</h2>
          <p>根据当前模型随机生成题目，提交答案后自动批改。</p>
        </div>
        <div class="practice-actions">
          <button class="primary-button" id="generateProblemButton" type="button">随机出题</button>
        </div>
        <div id="aiProblemBox" class="content-box muted-box">点击“随机出题”后，这里只显示新题目。</div>
        <form id="gradeForm" class="grade-form">
          <label class="answer-label" for="studentAnswer">你的答案</label>
          <textarea id="studentAnswer" rows="4" placeholder="写下你的计算过程或最终答案"></textarea>
          <button class="primary-button" type="submit">提交批改</button>
        </form>
      </section>

      <section class="card result-card" id="resultCard" hidden>
        <div class="card-heading">
          <h2>批改结果</h2>
        </div>
        <div id="gradeResult" class="grade-result-card" hidden></div>
      </section>

      <section class="card ask-card">
        <div class="card-heading">
          <h2>问AI</h2>
        </div>
        <form id="askForm" class="ask-form">
          <textarea id="askInput" rows="4" placeholder="输入你的问题"></textarea>
          <button class="primary-button" type="submit">发送问题</button>
        </form>
        <div id="askResult" class="answer-box" hidden></div>
      </section>
    </main>

    <script src="models.js"></script>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <script src="js/custom-interactives.js"></script>
    <script src="js/model-page.js"></script>
  </body>
</html>
