<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI动态数学课件</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#f5f7fb;
    }

    .page {
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:white;
  min-height:100vh;
  padding:12px;
  box-sizing:border-box;
}

@media (min-width:700px) {
  .page {
    max-width:760px;
    padding:24px;
  }

  .title {
    font-size:28px;
  }

  .card {
    padding:22px;
  }

  svg {
    height:360px;
  }

  .ai {
    font-size:18px;
  }

  button {
    height:56px;
    font-size:20px;
  }

  .input-box {
    height:52px;
    font-size:18px;
  }
}

    .title {
      font-size:22px;
      font-weight:bold;
      margin-bottom:12px;
    }

    .card {
      background:#f7f9ff;
      border-radius:16px;
      padding:12px;
      margin-bottom:14px;
      box-sizing:border-box;
    }

    .ai {
      line-height:1.7;
      font-size:15px;
      color:#333;
    }

    button {
      width:100%;
      height:46px;
      border:0;
      border-radius:12px;
      background:#2f66ff;
      color:white;
      font-size:16px;
    }

    input[type="range"] {
      width:72%;
    }

    .input-box {
      width:100%;
      height:42px;
      margin-top:12px;
      border:1px solid #ddd;
      border-radius:10px;
      padding:0 10px;
      font-size:15px;
      box-sizing:border-box;
    }

    svg {
      width:100%;
      height:240px;
      background:white;
      border-radius:12px;
      display:block;
    }

    @media (max-width:480px) {
      .page {
        max-width:none;
        padding:10px;
      }

      .title {
        font-size:20px;
      }

      .card {
        padding:10px;
      }

      svg {
        height:220px;
      }

      .ai {
        font-size:14px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title">扇形面积动态模型</div>

    <div class="card">
      <svg viewBox="0 0 300 240">
        <circle cx="150" cy="120" r="80" fill="none" stroke="#ddd" stroke-width="2"/>
        <path id="sector" fill="rgba(47,102,255,0.18)" stroke="#2f66ff" stroke-width="3"/>
        <text x="142" y="125" font-size="14">O</text>
        <text id="label" x="20" y="220" font-size="14" fill="#333"></text>
      </svg>

      <div style="margin-top:12px;">
        半径 r：
        <input id="r" type="range" min="30" max="100" value="80" oninput="draw()">
      </div>

      <div style="margin-top:12px;">
        圆心角 θ：
        <input id="angle" type="range" min="20" max="300" value="80" oninput="draw()">
      </div>
    </div>

    <div class="card ai">
      <b>AI讲解：</b><br>
      <div id="aiText"></div>
    </div>

    <button onclick="showPractice()">练一练</button>

    <div id="practiceBox" class="card ai" style="display:none; margin-top:14px;">
      <b>练一练：</b><br>
      <div id="questionText"></div>

      <input id="answerInput" class="input-box" placeholder="输入你的答案，例如：4468.0">

      <button onclick="checkAnswer()" style="margin-top:12px;">提交答案</button>

      <div id="checkResult" style="margin-top:12px;"></div>
    </div>

    <div class="card ai" style="margin-top:14px;">
      <b>问问AI：</b><br>
      <input id="aiQuestion" class="input-box" placeholder="例如：为什么半径变大面积变化更明显？">

      <button onclick="askAI()" style="margin-top:12px;">让AI讲解</button>

      <div id="aiAnswer" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    let currentR = 80;
    let currentAngle = 80;
    let currentArea = 0;

    let practiceR = 0;
    let practiceAngle = 0;
    let practiceAnswer = 0;

    function draw() {
      const r = Number(document.getElementById('r').value);
      const angle = Number(document.getElementById('angle').value);

      currentR = r;
      currentAngle = angle;

      const cx = 150, cy = 120;
      const start = -90;
      const end = start + angle;

      const x1 = cx + r * Math.cos(start * Math.PI / 180);
      const y1 = cy + r * Math.sin(start * Math.PI / 180);
      const x2 = cx + r * Math.cos(end * Math.PI / 180);
      const y2 = cy + r * Math.sin(end * Math.PI / 180);

      const largeArc = angle > 180 ? 1 : 0;

      const d = `
        M ${cx} ${cy}
        L ${x1} ${y1}
        A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}
        Z
      `;

      document.getElementById('sector').setAttribute('d', d);

      const area = (angle / 360) * Math.PI * r * r;
      currentArea = area;

      document.getElementById('label').textContent =
        `r=${r}，θ=${angle}°，面积≈${area.toFixed(1)}`;

      document.getElementById('aiText').innerHTML = `
        当前半径是 <b>${r}</b>，圆心角是 <b>${angle}°</b>。<br><br>
        扇形面积公式：<br>
        <b>S = θ ÷ 360 × π × r²</b><br><br>
        代入数据：<br>
        S = ${angle} ÷ 360 × π × ${r}²<br><br>
        所以面积约等于：<br>
        <b>${area.toFixed(1)}</b><br><br>
        当你拖动半径时，面积变化会更明显，因为半径是平方关系。
      `;
    }

    function showPractice() {
      practiceR = Math.floor(Math.random() * 50) + 30;
      practiceAngle = Math.floor(Math.random() * 160) + 40;
      practiceAnswer = (practiceAngle / 360) * Math.PI * practiceR * practiceR;

      document.getElementById('practiceBox').style.display = 'block';

      document.getElementById('questionText').innerHTML = `
        已知一个扇形的半径 r = <b>${practiceR}</b>，
        圆心角 θ = <b>${practiceAngle}°</b>。<br><br>
        请计算这个扇形的面积。结果保留 1 位小数。
      `;

      document.getElementById('answerInput').value = '';
      document.getElementById('checkResult').innerHTML = '';
    }

    function checkAnswer() {
      const input = document.getElementById('answerInput').value;
      const userAnswer = Number(input);
      const correctAnswer = Number(practiceAnswer.toFixed(1));

      if (!input) {
        document.getElementById('checkResult').innerHTML = '请输入答案。';
        return;
      }

      if (Math.abs(userAnswer - correctAnswer) <= 0.2) {
        document.getElementById('checkResult').innerHTML =
          '✅ 回答正确！你已经掌握了扇形面积公式。';
      } else {
        document.getElementById('checkResult').innerHTML =
          `❌ 还差一点。正确答案约为 <b>${correctAnswer}</b>。<br>
          计算方法：${practiceAngle} ÷ 360 × π × ${practiceR}²`;
      }
    }

    async function askAI() {
      const question = document.getElementById('aiQuestion').value;

      if (!question) {
        document.getElementById('aiAnswer').innerHTML = '请输入你想问的问题。';
        return;
      }

      document.getElementById('aiAnswer').innerHTML = '🤖 AI正在思考...';

      try {
        const response = await fetch('/api/ask', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            question: question,
            r: currentR,
            angle: currentAngle,
            area: currentArea.toFixed(1)
          })
        });

        const data = await response.json();

        if (data.answer) {
          document.getElementById('aiAnswer').innerHTML =
            `🤖 AI回答：<br><br>${marked.parse(data.answer)}`;
        } else {
          document.getElementById('aiAnswer').innerHTML =
            `❌ AI请求失败：${data.error}`;
        }

      } catch (error) {
        document.getElementById('aiAnswer').innerHTML =
          '❌ AI连接失败，请检查服务是否正在运行。';
      }
    }

    draw();
  </script>
</body>
</html>
